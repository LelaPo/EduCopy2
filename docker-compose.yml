version: '3.8'

services:
  homework-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homework-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_BASE_URL=${API_BASE_URL}
      - API_BEARER_TOKEN=${API_BEARER_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - DB_PATH=/app/data/homework_bot.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROXY_HOST=${PROXY_HOST:-}
      - PROXY_PORT=${PROXY_PORT:-}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASS=${PROXY_PASS:-}
    volumes:
      # Persist database data
      - bot_data:/app/data
      # Optional: persist logs
      - bot_logs:/app/logs
    networks:
      - bot_network
    # Optional: Set memory limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  bot_data:
    name: homework-bot-data
  bot_logs:
    name: homework-bot-logs

networks:
  bot_network:
    name: homework-bot-network
    driver: bridge
